replicaCount: 1

image:
  repository: trailflow
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

env:
  NODE_ENV: production
  LOG_LEVEL: info
  OLLAMA_BASE_URL: http://host.docker.internal:11434
  OLLAMA_MODEL: qwen3:1.7b
  DB_PROVIDER: sqlite

secrets:
  API_KEY: ""
  DATABASE_URL: postgres://trailflow:trailflow@postgres:5432/trailflow
  TELEGRAM_BOT_TOKEN: ""
  ALLOWED_TELEGRAM_USER_IDS: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
