apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trailflow.fullname" . }}-config
data:
  NODE_ENV: {{ .Values.env.NODE_ENV | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  OLLAMA_BASE_URL: {{ .Values.env.OLLAMA_BASE_URL | quote }}
  OLLAMA_MODEL: {{ .Values.env.OLLAMA_MODEL | quote }}
  DB_PROVIDER: {{ .Values.env.DB_PROVIDER | quote }}
