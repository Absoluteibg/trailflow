services:
  trailflow:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:1.7b}
      - API_KEY=${API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DB_PROVIDER=${DB_PROVIDER:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-postgres://trailflow:trailflow@postgres:5432/trailflow}
    volumes:
      - ./workspace:/app/workspace
      - ./data:/app/data
    depends_on:
      - postgres
      - prometheus
      - grafana
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=trailflow
      - POSTGRES_USER=trailflow
      - POSTGRES_PASSWORD=trailflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
